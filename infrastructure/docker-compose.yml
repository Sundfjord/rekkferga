version: '3.8'

services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rekkferga
      POSTGRES_PASSWORD: rekkferga
      POSTGRES_DB: rekkferga
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: ../packages/api
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://rekkferga:rekkferga@postgres:5432/rekkferga
      - ORS_API_KEY=${ORS_API_KEY}
      - FLASK_ENV=development
    volumes:
      - ../packages/api:/app
    depends_on:
      - postgres
    restart: unless-stopped

  web:
    build: ../packages/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api
    restart: unless-stopped

  cron:
    build: ../packages/cron
    environment:
      - DATABASE_URL=postgresql://rekkferga:rekkferga@postgres:5432/rekkferga
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
