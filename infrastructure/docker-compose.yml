version: '3.8'

services:
  api:
    build: ../packages/api
    ports:
      - "5000:5000"
    environment:
      - COSMOS_CONNECTION_STRING=${COSMOS_CONNECTION_STRING}
      - FLASK_ENV=development
    volumes:
      - ../packages/api:/app
    restart: unless-stopped

  web:
    build: ../packages/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api
    restart: unless-stopped

  cron:
    build: ../packages/cron
    environment:
      - COSMOS_CONNECTION_STRING=${COSMOS_CONNECTION_STRING}
    depends_on:
      - api
    restart: unless-stopped
